<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      border: 3px solid #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 64px;
      position: relative;
    }

    /* Top accent bar */
    .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: #000;
    }

    /* Logo */
    .logo {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      color: #000;
      text-transform: uppercase;
    }

    /* Main headline */
    .headline {
      font-family: 'Anton', sans-serif;
      font-size: 88px;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: #000;
      text-transform: uppercase;
    }

    .headline span {
      display: inline-block;
      background: #000;
      color: #fff;
      padding: 0 12px;
    }

    /* Subline */
    .subline {
      font-size: 24px;
      font-weight: 600;
      color: #444;
      margin-top: 20px;
      letter-spacing: 0.01em;
    }

    /* Bottom row */
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .domain {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: #000;
      text-transform: uppercase;
    }

    /* Retailer chips */
    .chips {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chip {
      border: 2px solid #000;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 3px 3px 0px #000;
    }

    .chip.filled {
      background: #000;
      color: #fff;
    }

    /* Decorative price tags */
    .price-cluster {
      position: absolute;
      right: 64px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .price-tag {
      border: 2px solid #000;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 32px;
      box-shadow: 4px 4px 0px #000;
      background: #fff;
      min-width: 240px;
    }

    .price-tag .retailer {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .price-tag .price {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 0.02em;
    }

    .price-tag.best {
      background: #000;
      color: #fff;
    }

    .price-tag .badge {
      font-size: 10px;
      font-weight: 700;
      background: #fff;
      color: #000;
      padding: 2px 6px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>

    <!-- Top: logo -->
    <div class="logo">Get The Best Price</div>

    <!-- Middle: headline -->
    <div>
      <div class="headline">
        COMPARE<br>
        <span>EVERY</span><br>
        RETAILER.
      </div>
      <div class="subline">Real-time trainer prices across JD, Zalando, End, StockX &amp; more.</div>
    </div>

    <!-- Decorative price comparison -->
    <div class="price-cluster">
      <div class="price-tag best">
        <div>
          <div class="retailer">Zalando</div>
        </div>
        <div class="price">£54</div>
      </div>
      <div class="price-tag">
        <div class="retailer">End Clothing</div>
        <div class="price">£70</div>
      </div>
      <div class="price-tag">
        <div class="retailer">JD Sports</div>
        <div class="price">£90</div>
      </div>
      <div style="font-size:11px;font-weight:700;letter-spacing:0.06em;color:#888;text-align:center;margin-top:4px">
        NIKE AIR FORCE 1 WHITE · LIVE PRICES
      </div>
    </div>

    <!-- Bottom: domain + chips -->
    <div class="bottom">
      <div class="domain">getthebestprice.co.uk</div>
      <div class="chips">
        <div class="chip filled">Free</div>
        <div class="chip">UK Retailers</div>
        <div class="chip">Real-Time</div>
      </div>
    </div>
  </div>
</body>
</html>
